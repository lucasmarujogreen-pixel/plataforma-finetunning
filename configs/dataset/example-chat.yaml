name: example-chat
path: datasets/raw/example_chat.jsonl
format: jsonl
record_schema: chat
streaming: false
deduplicate: true
text_field: text
messages_field: messages
cleaning:
  strip_whitespace: true
  drop_empty: true
  min_chars: 1
  max_chars: 100000
split:
  validation: 0.05
  test: 0.0
  shuffle: true
cache_dir: datasets/cache
processed_dir: datasets/processed
